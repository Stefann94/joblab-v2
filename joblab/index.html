<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job-Lab | Industrial Search</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="hero-search.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesk:wght@800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">

    <div id="navbar-placeholder"></div>

    <main>
        <section class="hero-search-top">
            <div class="hero-main-shape">
                <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070" alt="Industrial" class="hero-bg-img">
                <div class="hero-overlay"></div>
            </div>

            <div class="search-wrapper">
                <div class="search-header-top">
                    <h1 class="main-title">
                        CONSTRUIM <br> 
                        <span class="accent-text">CARIERE SOLIDE</span>
                    </h1>
                    <p class="sub-title-industrial">Acces la cele mai importante proiecte industriale și tehnologice din România.</p>
                </div>

                <div class="search-box-wild">
                    <form class="search-form" autocomplete="off">
                        
                        <div class="input-group">
                            <label>DOMENIU ACTIVITATE</label>
                            <input type="text" id="input-domeniu" placeholder="Ex: Inginerie, Management..." class="industrial-input">
                            
                            <!-- LISTĂ SUGESTII ASIMETRICĂ -->
                            <div id="suggestions-domeniu" class="suggestions-list"></div>
                        </div>
                        
                        <div class="input-divider"></div>

                        <div class="input-group">
                            <label>LOCALITATE</label>
                            <input type="text" id="input-localitate" placeholder="Oraș sau Județ" class="industrial-input">

                            <!-- LISTĂ SUGESTII ASIMETRICĂ -->
                            <div id="suggestions-localitate" class="suggestions-list"></div>
                        </div>

                        <button type="submit" class="search-submit-btn">
                            CAUTĂ JOBURI
                        </button>
                    </form>
                </div>

                <div class="quick-tags-minimal">
                    <a href="#">#Engineering</a>
                    <a href="#">#Tech</a>
                    <a href="#">#Production</a>
                    <a href="#">#Logistics</a>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="componente.js"></script>
    <script src="hero-search.js"></script>
    
</body>
</html>
